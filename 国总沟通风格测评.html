<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>国总沟通风格自评表</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f7fa; color: #333; line-height: 1.6; }
.container { max-width: 800px; margin: 0 auto; padding: 20px; }

/* 介绍页 */
.intro { text-align: center; padding: 60px 20px; }
.intro h1 { font-size: 28px; margin-bottom: 16px; color: #1a1a2e; }
.intro .subtitle { font-size: 16px; color: #666; margin-bottom: 40px; }
.intro .instructions { background: #fff; border-radius: 12px; padding: 30px; text-align: left; margin-bottom: 40px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.intro .instructions h3 { margin-bottom: 12px; color: #1a1a2e; }
.intro .instructions p { color: #555; margin-bottom: 8px; }

/* 答题页 */
.quiz-header { position: sticky; top: 0; background: #fff; padding: 16px 0; border-bottom: 1px solid #e8e8e8; z-index: 100; margin-bottom: 20px; }
.progress-bar { height: 6px; background: #e8e8e8; border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #4f6df5, #7c5cfc); border-radius: 3px; transition: width 0.3s; }
.progress-text { font-size: 13px; color: #999; text-align: right; }
.dimension-tag { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 13px; margin-bottom: 16px; font-weight: 500; }
.dim-1 { background: #e8f0fe; color: #1967d2; }
.dim-2 { background: #fce8e6; color: #c5221f; }
.dim-3 { background: #e6f4ea; color: #137333; }
.dim-4 { background: #fef7e0; color: #b06000; }
.dim-5 { background: #f3e8fd; color: #7627bb; }

.question-card { background: #fff; border-radius: 12px; padding: 28px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.question-text { font-size: 17px; font-weight: 500; color: #1a1a2e; margin-bottom: 20px; line-height: 1.7; }
.option-list { display: flex; flex-direction: column; gap: 10px; }
.option { padding: 14px 18px; border: 2px solid #e8e8e8; border-radius: 10px; cursor: pointer; transition: all 0.2s; font-size: 15px; color: #444; position: relative; }
.option:hover { border-color: #b0c4ff; background: #f8faff; }
.option.selected { border-color: #4f6df5; background: #f0f4ff; color: #1a1a2e; }
.option .opt-label { font-weight: 600; margin-right: 8px; }

.nav-buttons { display: flex; justify-content: space-between; margin-top: 20px; }
.btn { padding: 12px 32px; border-radius: 8px; border: none; font-size: 15px; cursor: pointer; transition: all 0.2s; font-weight: 500; }
.btn-primary { background: #4f6df5; color: #fff; }
.btn-primary:hover { background: #3d5be0; }
.btn-primary:disabled { background: #ccc; cursor: not-allowed; }
.btn-secondary { background: #fff; color: #4f6df5; border: 1px solid #4f6df5; }
.btn-secondary:hover { background: #f0f4ff; }

/* 报告页 */
.report { padding: 20px 0; }
.report h1 { font-size: 24px; text-align: center; margin-bottom: 8px; color: #1a1a2e; }
.report .report-subtitle { text-align: center; color: #999; margin-bottom: 30px; font-size: 14px; }
.report-section { background: #fff; border-radius: 12px; padding: 28px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.report-section h2 { font-size: 18px; color: #1a1a2e; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #f0f0f0; }

/* 画像条 */
.profile-item { margin-bottom: 24px; }
.profile-label { font-size: 14px; font-weight: 600; color: #1a1a2e; margin-bottom: 4px; }
.profile-bar-container { position: relative; height: 40px; }
.profile-bar { position: absolute; top: 16px; left: 0; right: 0; height: 6px; background: #f0f0f0; border-radius: 3px; }
.profile-segments { position: absolute; top: 16px; left: 0; right: 0; height: 6px; display: flex; border-radius: 3px; overflow: hidden; }
.profile-segments span { flex: 1; }
.seg-low { background: #fce8e6; }
.seg-mid { background: #fef7e0; }
.seg-high { background: #e6f4ea; }
.profile-point { position: absolute; top: 8px; width: 22px; height: 22px; background: #4f6df5; border: 3px solid #fff; border-radius: 50%; box-shadow: 0 2px 6px rgba(0,0,0,0.2); transform: translateX(-50%); z-index: 2; transition: left 0.8s ease; }
.profile-labels { position: absolute; top: 28px; left: 0; right: 0; display: flex; font-size: 11px; color: #999; }
.profile-labels span { flex: 1; }
.profile-labels .label-left { text-align: left; }
.profile-labels .label-center { text-align: center; }
.profile-labels .label-right { text-align: right; }

/* 维度详情 */
.dim-detail { margin-bottom: 28px; padding-bottom: 24px; border-bottom: 1px solid #f0f0f0; }
.dim-detail:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.dim-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.dim-score { font-size: 28px; font-weight: 700; color: #4f6df5; }
.dim-name { font-size: 16px; font-weight: 600; color: #1a1a2e; }
.dim-level { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
.level-low { background: #fce8e6; color: #c5221f; }
.level-mid { background: #fef7e0; color: #b06000; }
.level-high { background: #e6f4ea; color: #137333; }
.dim-content { margin-bottom: 16px; }
.dim-content h4 { font-size: 14px; color: #666; margin-bottom: 6px; font-weight: 600; }
.dim-content p { font-size: 14px; color: #555; line-height: 1.7; }
.dim-content ul { padding-left: 20px; }
.dim-content li { font-size: 14px; color: #555; margin-bottom: 4px; line-height: 1.7; }
.scenario-box { background: #f8faff; border-left: 3px solid #4f6df5; padding: 12px 16px; border-radius: 0 8px 8px 0; margin-bottom: 10px; }
.scenario-box .q-label { font-size: 12px; color: #4f6df5; font-weight: 600; margin-bottom: 4px; }
.scenario-box .q-text { font-size: 13px; color: #666; margin-bottom: 6px; }
.scenario-box .your-choice { font-size: 13px; color: #1a1a2e; font-weight: 500; }
.scenario-box .choice-analysis { font-size: 13px; color: #555; margin-top: 6px; line-height: 1.7; }

/* 关键发现 */
.finding-item { padding: 16px; border-radius: 8px; margin-bottom: 12px; }
.finding-strength { background: #e6f4ea; border-left: 3px solid #137333; }
.finding-blind { background: #fce8e6; border-left: 3px solid #c5221f; }
.finding-item h4 { font-size: 14px; margin-bottom: 6px; }
.finding-item p { font-size: 14px; color: #555; line-height: 1.7; }

/* 行动建议 */
.action-item { display: flex; gap: 12px; margin-bottom: 16px; align-items: flex-start; }
.action-num { min-width: 28px; height: 28px; background: #4f6df5; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; }
.action-text { font-size: 14px; color: #555; line-height: 1.7; }
.action-text strong { color: #1a1a2e; }

.restart-btn { display: block; margin: 30px auto; padding: 14px 40px; }

/* 隐藏 */
.hidden { display: none !important; }

/* 密码页 */
.password-page { text-align: center; padding: 80px 20px; }
.password-page h1 { font-size: 24px; margin-bottom: 8px; color: #1a1a2e; }
.password-page .pwd-subtitle { color: #666; margin-bottom: 40px; font-size: 14px; }
.pwd-box { background: #fff; border-radius: 12px; padding: 36px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); max-width: 400px; margin: 0 auto 20px; }
.pwd-box label { display: block; font-size: 14px; color: #555; margin-bottom: 12px; text-align: left; }
.pwd-box input { width: 100%; padding: 12px 16px; border: 2px solid #e8e8e8; border-radius: 8px; font-size: 16px; outline: none; transition: border-color 0.2s; }
.pwd-box input:focus { border-color: #4f6df5; }
.pwd-error { color: #c5221f; font-size: 13px; margin-top: 8px; display: none; text-align: left; }
.pwd-btn { width: 100%; margin-top: 16px; }
</style>
</head>
<body>

<!-- 密码页 -->
<div id="pwdPage" class="container password-page">
  <h1>国总沟通风格自评表</h1>
  <p class="pwd-subtitle">请输入访问密码以开始测评</p>
  <div class="pwd-box">
    <label for="pwdInput">访问密码</label>
    <input type="password" id="pwdInput" placeholder="请输入密码" onkeydown="if(event.key==='Enter')checkPwd()">
    <p class="pwd-error" id="pwdError">密码错误，请重新输入</p>
    <button class="btn btn-primary pwd-btn" onclick="checkPwd()">验证并进入</button>
  </div>
</div>

<!-- 介绍页 -->
<div id="introPage" class="container intro hidden">
  <h1>国总沟通风格自评表</h1>
  <p class="subtitle">海外管理者沟通风格行为诊断工具</p>
  <div class="instructions">
    <h3>填写说明</h3>
    <p>1. 以下共有 23 道题，每题描述一个海外管理场景</p>
    <p>2. 请根据你的真实行为习惯选择最可能采取的做法</p>
    <p>3. 没有对错之分，选择最符合你的选项即可</p>
    <p>4. 预计用时约 8-10 分钟</p>
    <p>5. 完成后可立即查看你的沟通风格诊断报告</p>
  </div>
  <button class="btn btn-primary" onclick="startQuiz()">开始测评</button>
</div>

<!-- 答题页 -->
<div id="quizPage" class="container hidden">
  <div class="quiz-header">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText">0 / 23</div>
  </div>
  <div id="questionContainer"></div>
  <div class="nav-buttons">
    <button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()" disabled>上一题</button>
    <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">下一题</button>
  </div>
</div>

<!-- 报告页 -->
<div id="reportPage" class="container report hidden"></div>

<script>
// ========== 密码验证 ==========
const ACCESS_PASSWORD = 'guozong2024';

function checkPwd() {
  const input = document.getElementById('pwdInput').value;
  if (input === ACCESS_PASSWORD) {
    showPage('introPage');
  } else {
    document.getElementById('pwdError').style.display = 'block';
    document.getElementById('pwdInput').value = '';
    document.getElementById('pwdInput').focus();
  }
}

// ========== 数据定义 ==========
const dimensions = [
  { name: '表达风格', tagClass: 'dim-1', questions: [0,1,2,3,4],
    levels: [
      { name: '对抗-回避型', min: 1, max: 2, color: 'level-low',
        pattern: '你在表达上要么太强硬直接对抗，要么回避不处理，缺少中间地带。在海外管理中，这两种极端都容易出问题——对抗让本地团队防御，回避让问题持续发酵。',
        pros: ['在紧急情况下，对抗风格能快速推动执行', '回避风格在某些文化中被视为"给面子"'],
        cons: ['对抗在跨文化场景中容易被理解为"不尊重"，尤其在高权力距离文化中', '回避会让团队觉得"领导不管事"或"标准可以商量"', '团队难以预测你的反应方式，沟通成本增加']
      },
      { name: '指令-灵活型', min: 2, max: 3, color: 'level-mid',
        pattern: '你能根据情境调整表达方式，偏任务导向，目标清晰但有时缺少背景解释。在中方团队中这种风格比较高效，但在跨文化场景中可能需要更多的"为什么"。',
        pros: ['效率高，团队知道目标和标准', '有一定弹性，不是一味强硬或一味退让', '在执行力强的团队中效果好'],
        cons: ['"只说做什么不说为什么"在本地团队中可能导致"机械执行"而非"认同执行"', '对总部的反馈可能偏委婉，导致本地市场声音传不上去', '当团队能力不足时，目标授权可能变成"放任"']
      },
      { name: '诊断-建构型', min: 3, max: 4.01, color: 'level-high',
        pattern: '你倾向于先理解情境再选择沟通方式，善于通过解释背景和原因来提升团队的认同感。你不回避问题，但也不急于下结论。',
        pros: ['兼顾信息收集和关系维护', '团队理解"为什么"，执行质量更高', '在跨文化场景中更容易获得本地团队的认同'],
        cons: ['在紧急情况下可能被解读为"犹豫不决"', '过多的解释在某些文化中可能被视为"领导不够果断"', '需要在"充分沟通"和"快速决策"之间找到平衡']
      }
    ]
  },
  { name: '情绪觉察', tagClass: 'dim-2', questions: [5,6,7,8],
    levels: [
      { name: '盲区-焦虑型', min: 1, max: 2, color: 'level-low',
        pattern: '你对自身情绪的觉察度较低，可能在情绪激动时难以自我察觉和调整。当文化差异导致工作节奏变化时，你容易产生焦虑或不满，但不太能识别这些情绪正在影响你的判断。',
        pros: ['在高压环境中，"不太在意情绪"有时能保持执行力'],
        cons: ['情绪可能在不经意间影响沟通效果和团队氛围', '下属能感受到你的情绪即使你没说出来', '在跨文化场景中，情绪外露更容易被放大解读', '长期积累可能在临界点爆发，造成关系损伤']
      },
      { name: '理解-犯难型', min: 2, max: 3, color: 'level-mid',
        pattern: '你能意识到文化差异的存在，在理智上理解"不应该用自己的标准要求别人"。但当文化差异真正影响到工作时，你内心仍然会产生焦虑或不满，而且不太确定该怎么处理这种情绪。',
        pros: ['你有"文化差异"这根弦，不会完全无视', '你至少能意识到自己的情绪波动', '有改变的基础和意愿'],
        cons: ['"理解但做不到"的状态长期持续，会变成一种隐性文化偏见', '下属能感受到你的"内心纠结"，即使你没有说出来', '可能在某个临界点突然爆发', '停留在认知层面不够，需要发展出具体的行为策略']
      },
      { name: '重评-校准型', min: 3, max: 4.01, color: 'level-high',
        pattern: '你对自身情绪有清晰的觉察能力，能够在情绪波动时及时识别并主动调整。你能够将文化差异带来的"不适"重新定义为"常态"，释放认知资源用于解决问题。',
        pros: ['能将事件从"威胁"重新定义为"常态"', '不会让情绪干扰管理决策', '在跨文化场景中保持稳定'],
        cons: ['过度平静可能让团队觉得你"不关心"', '可以将觉察力延伸到团队层面——识别他人的情绪状态']
      }
    ]
  },
  { name: '倾听习惯', tagClass: 'dim-3', questions: [9,10,11,12],
    levels: [
      { name: '替代-截断型', min: 1, max: 2, color: 'level-low',
        pattern: '你在倾听方面需要特别关注——你可能习惯性地打断他人或替对方表达。这会让团队觉得"说了也没用"，久而久之选择沉默。',
        pros: ['在时间紧迫时能快速推进', '对思路不清的下属可能起到"拉回正轨"的作用'],
        cons: ['传递"我不耐烦"的信号，尤其在高语境文化中被视为不尊重', '团队会逐渐停止主动表达', '你可能错过对方方案中的新视角', '在跨语言场景中，打断比沉默的伤害更大']
      },
      { name: '等待-被动型', min: 2, max: 3, color: 'level-mid',
        pattern: '你不会频繁打断别人，但也不是一个主动的倾听者。当对方沉默或表达困难时，你会等一等，但不太会主动用提问或引导帮助对方说出来。',
        pros: ['给了一定的表达空间', '不会让人觉得完全被忽视', '比截断型有明显进步'],
        cons: ['"等着但不主动"会让本地员工觉得压力很大——沉默中他们猜测"领导是不是不耐烦了"', '你可能觉得自己"没有打断"就算倾听了，但团队的感受是"领导没在认真听"', '在跨语言场景中，"等"不如"帮"——一个支架式提问比沉默等待更能帮对方把想法说出来']
      },
      { name: '支架-觉察型', min: 3, max: 4.01, color: 'level-high',
        pattern: '你善于倾听，能够通过提问帮助对方完成表达。你给予空间的同时保持对沟通状态的觉察，能够在倾听和支持之间灵活切换。',
        pros: ['帮助表达困难的人把想法说出来', '团队感到被支持而非被施压', '能听到更多的真实信息'],
        cons: ['需要更多时间和耐心', '可以进一步关注非语言信号（表情、语气等）']
      }
    ]
  },
  { name: '反馈接纳', tagClass: 'dim-4', questions: [13,14,15,16,17],
    levels: [
      { name: '防御-归咎型', min: 1, max: 2, color: 'level-low',
        pattern: '当团队提出不同意见时，你内心会有较强的不适感，倾向于为自己的意图辩护或将问题归因于他人。团队会很快学会一个信号——"提了也没用"，然后不再提。',
        pros: ['在某些需要快速决策的场景中，不纠结于不同意见能提高效率'],
        cons: ['团队会迅速形成"不说真话"的习惯', '你发现的"沉默"往往不是第一天形成的', '通过HR投诉或第三方转达往往是反馈渠道失效的最后信号', '失去从团队获取真实信息的能力', '在跨文化场景中，本地员工的文化背景让他们更难主动反馈']
      },
      { name: '抑制-延迟型', min: 2, max: 3, color: 'level-mid',
        pattern: '当团队提出不同意见时，你不会当场拒绝，但内心会有不适感。你愿意"听"，但不一定真的"接"。反馈过后，你可能会想想，但很少主动去找人确认真实想法。',
        pros: ['没有让提意见的人当场难堪', '至少没有关上反馈的门', '有一定的反思意识'],
        cons: ['团队感受到的是"提了也没用"', '"我问了他们不说" vs 团队觉得"问了也白说"——双方的感知存在系统性偏差', '通过HR投诉往往是渠道失效的信号', '在跨文化场景中，本地员工的文化背景让间接反馈更常见，需要你更主动']
      },
      { name: '探究-整合型', min: 3, max: 4.01, color: 'level-high',
        pattern: '你对不同意见持开放态度，能够认真考虑团队的观点。你主动寻求反馈，并将反馈转化为具体的行为改变。这是建立团队心理安全的基础。',
        pros: ['团队敢于说真话', '你能获取更准确的信息做出决策', '跨文化管理中建立信任的关键能力'],
        cons: ['需要持续维护——一次的防御反应可能摧毁长期建立的信任', '可以将个人经验转化为团队制度（如定期匿名反馈机制）']
      }
    ]
  },
  { name: '跨文化敏感度', tagClass: 'dim-5', questions: [18,19,20,21,22],
    levels: [
      { name: '同化-忽视型', min: 1, max: 2, color: 'level-low',
        pattern: '你在跨文化沟通中倾向于以自身文化标准衡量他人，将文化行为差异误判为个人能力或态度问题。这在海外管理中是最需要改进的。',
        pros: ['在需要统一标准的场景中有一定合理性'],

// 重点场景选择（每个维度选1-2道最有诊断价值的题）
const keyScenarios = [0, 4, 6, 8, 10, 12, 13, 15, 17, 19, 21]; // Q1,Q5,Q7,Q9,Q11,Q13,Q14,Q16,Q18,Q20,Q22

// ========== 全局状态 ==========
let currentQ = 0;
let answers = new Array(23).fill(-1); // -1表示未作答

// ========== 页面切换 ==========
function showPage(id) {
  document.querySelectorAll('.container').forEach(el => el.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  window.scrollTo(0, 0);
}

function startQuiz() {
  showPage('quizPage');
  renderQuestion();
}

// ========== 答题逻辑 ==========
function renderQuestion() {
  const q = questions[currentQ];
  const dim = dimensions[q.dim];
  const total = questions.length;
  const answered = answers.filter(a => a !== -1).length;

  document.getElementById('progressFill').style.width = ((answered / total) * 100) + '%';
  document.getElementById('progressText').textContent = answered + ' / ' + total;

  let html = `
    <div class="question-card">
      <span class="dimension-tag ${dim.tagClass}">${dim.name}</span>
      <div class="question-text">Q${currentQ+1}. ${q.text}</div>
      <div class="option-list">
  `;

  q.options.forEach((opt, i) => {
    const selected = answers[currentQ] === i ? ' selected' : '';
    html += `<div class="option${selected}" onclick="selectOption(${i})">
      <span class="opt-label">${String.fromCharCode(65+i)}.</span>${opt.text}
    </div>`;
  });

  html += `</div></div>`;
  document.getElementById('questionContainer').innerHTML = html;

  // 按钮状态
  document.getElementById('prevBtn').disabled = currentQ === 0;
  const nextBtn = document.getElementById('nextBtn');
  if (currentQ === total - 1) {
    nextBtn.textContent = answered === total ? '查看报告' : `已完成 ${answered}/${total}，提交查看报告`;
    nextBtn.disabled = false;
  } else {
    nextBtn.textContent = '下一题';
    nextBtn.disabled = false;
  }
}

function selectOption(idx) {
  answers[currentQ] = idx;
  renderQuestion();
}

function nextQuestion() {
  if (currentQ < questions.length - 1) {
    currentQ++;
    renderQuestion();
  } else {
    // 检查是否全部作答
    const unanswered = [];
    for (let i = 0; i < 23; i++) {
      if (answers[i] === -1) unanswered.push(i + 1);
    }
    if (unanswered.length > 0) {
      if (!confirm(`你还有第 ${unanswered.join('、')} 题未作答，确定要提交查看报告吗？`)) return;
    }
    generateReport();
  }
}

function prevQuestion() {
  if (currentQ > 0) {
    currentQ--;
    renderQuestion();
  }
}

// ========== 评分与报告生成 ==========
function calculateScores() {
  const dimScores = [];
  dimensions.forEach((dim, di) => {
    let total = 0, count = 0;
    dim.questions.forEach(qi => {
      if (answers[qi] !== -1) {
        total += questions[qi].options[answers[qi]].score;
        count++;
      }
    });
    dimScores.push(count > 0 ? total / count : 0);
  });
  return dimScores;
}

function getLevel(dimIdx, score) {
  const levels = dimensions[dimIdx].levels;
  for (let i = 0; i < levels.length; i++) {
    if (score >= levels[i].min && score < levels[i].max) return levels[i];
  }
  return levels[levels.length - 1];
}

function generateReport() {
  const scores = calculateScores();
  const now = new Date();
  const dateStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');

  let html = `
    <h1>国总沟通风格诊断报告</h1>
    <p class="report-subtitle">测评日期：${dateStr}</p>

    <!-- 一、沟通风格画像 -->
    <div class="report-section">
      <h2>一、你的沟通风格画像</h2>
  `;

  // 画像条
  dimensions.forEach((dim, di) => {
    const score = scores[di];
    const level = getLevel(di, score);
    const percent = ((score - 1) / 3) * 100;
    html += `
      <div class="profile-item">
        <div class="profile-label">${dim.name}</div>
        <div class="profile-bar-container">
          <div class="profile-segments">
            <span class="seg-low"></span>
            <span class="seg-mid"></span>
            <span class="seg-high"></span>
          </div>
          <div class="profile-point" style="left: ${Math.max(2, Math.min(98, percent))}%"></div>
          <div class="profile-labels">
            <span class="label-left">${dim.levels[0].name}</span>
            <span class="label-center">${dim.levels[1].name}</span>
            <span class="label-right">${dim.levels[2].name}</span>
          </div>
        </div>
      </div>
    `;
  });
  html += `</div>`;

  // 二、你的风格类型
  const typeNames = dimensions.map((dim, di) => getLevel(di, scores[di]).name);
  html += `
    <div class="report-section">
      <h2>二、你的风格类型</h2>
      <p style="font-size:16px; color:#1a1a2e; font-weight:600; margin-bottom:12px;">
        ${typeNames.join(' × ')}
      </p>
    </div>
  `;

  // 三、各维度详细分析
  html += `<div class="report-section"><h2>三、各维度详细分析</h2>`;

  dimensions.forEach((dim, di) => {
    const score = scores[di];
    const level = getLevel(di, score);

    html += `
      <div class="dim-detail">
        <div class="dim-header">
          <span class="dim-score">${score.toFixed(1)}</span>
          <span class="dim-name">${dim.name}</span>
          <span class="dim-level ${level.color}">${level.name}</span>
        </div>
        <div class="dim-content">
          <h4>你的行为模式</h4>
          <p>${level.pattern}</p>
        </div>
        <div class="dim-content">
          <h4>这个风格的好处</h4>
          <ul>${level.pros.map(p => `<li>${p}</li>`).join('')}</ul>
        </div>
        <div class="dim-content">
          <h4>这个风格的潜在风险</h4>
          <ul>${level.cons.map(c => `<li>${c}</li>`).join('')}</ul>
        </div>
    `;

    // 动态场景回顾：从该维度中挑keyScenarios
    const dimKeyScenarios = keyScenarios.filter(qi => questions[qi].dim === di && answers[qi] !== -1);
    if (dimKeyScenarios.length > 0) {
      html += `<div class="dim-content"><h4>典型场景回顾</h4>`;
      dimKeyScenarios.forEach(qi => {
        const q = questions[qi];
        const chosen = q.options[answers[qi]];
        html += `
          <div class="scenario-box">
            <div class="q-label">Q${qi+1}</div>
            <div class="q-text">${q.text}</div>
            <div class="your-choice">你选了${String.fromCharCode(65+answers[qi])}：${chosen.text}</div>
            <div class="choice-analysis">${chosen.analysis}</div>
          </div>
        `;
      });
      html += `</div>`;
    }

    html += `</div>`;
  });
  html += `</div>`;

  // 四、关键发现
  // 找最强和最弱的维度
  const sortedDims = scores.map((s, i) => ({ score: s, idx: i })).sort((a, b) => b.score - a.score);
  const strengths = sortedDims.slice(0, 2);
  const blinds = sortedDims.slice(-2).reverse();

  html += `
    <div class="report-section">
      <h2>四、关键发现</h2>
      <div class="dim-content"><h4>你的优势领域</h4></div>
  `;
  strengths.forEach(s => {
    const level = getLevel(s.idx, s.score);
    html += `<div class="finding-item finding-strength">
      <h4>${dimensions[s.idx].name}（${s.score.toFixed(1)}分）</h4>
      <p>${level.pattern.substring(0, 80)}...</p>
    </div>`;
  });

  html += `<div class="dim-content" style="margin-top:16px"><h4>你的盲区领域</h4></div>`;
  blinds.forEach(s => {
    const level = getLevel(s.idx, s.score);
    html += `<div class="finding-item finding-blind">
      <h4>${dimensions[s.idx].name}（${s.score.toFixed(1)}分）</h4>
      <p>${level.pattern.substring(0, 80)}...</p>
    </div>`;
  });
  html += `</div>`;

  // 五、下一步建议
  const dimActions = [
    // 表达风格
    ['下次布置任务时，先花2分钟解释"为什么要做这件事"，再说"期望的结果"', '找一个最近让你纠结的向上反馈场景，写一份附数据的简短意见发出去'],
    // 情绪觉察
    ['本周找一个触发你情绪的场景，事后花3分钟写下"我当时的情绪是什么、为什么"', '下次意识到语气不好时，24小时内找对方确认"上次我的方式你有没有不舒服"'],
    // 倾听习惯
    ['下次有人汇报卡住时，试试支架式提问："你是不是想说关于___的问题？"', '本周的1对1谈话中，对方沉默时数到10再开口'],
    // 反馈接纳
    ['本周找一位信任的下属问一个问题："你觉得在我面前说真话安全吗？"', '在下次会议上，当有人提出不同意见时，说"你说说为什么，我们讨论一下"'],
    // 跨文化敏感度
    ['本周找一位本地员工做一次15分钟聊天，只聊他的文化背景和工作感受', '梳理你所在市场中，中方团队和本地团队在3个方面的沟通差异，写成一页纸']
  ];

  // 找最需要改进的2个维度
  const needImprove = sortedDims.slice(-2).reverse();

  html += `<div class="report-section"><h2>五、下一步建议</h2>
    <p style="color:#666; margin-bottom:16px; font-size:14px;">基于你的测评结果，建议你从最需要改进的维度开始：</p>
  `;
  needImprove.forEach((item, i) => {
    const actions = dimActions[item.idx];
    actions.forEach((action, ai) => {
      html += `
        <div class="action-item">
          <div class="action-num">${i*2+ai+1}</div>
          <div class="action-text"><strong>${dimensions[item.idx].name}：</strong>${action}</div>
        </div>
      `;
    });
  });
  html += `</div>`;

  // 底部
  html += `
    <div style="text-align:center; padding:20px 0; color:#999; font-size:13px;">
      <p>本报告由干部发展部出品</p>
      <p style="margin-top:8px;">本测评仅供个人发展参考，不作为绩效评价依据</p>
    </div>
    <button class="btn btn-secondary restart-btn" onclick="restart()">重新测评</button>
  `;

  document.getElementById('reportPage').innerHTML = html;
  showPage('reportPage');

  // 动画效果：画像条的点从左滑入
  setTimeout(() => {
    document.querySelectorAll('.profile-point').forEach(el => {
      el.style.transition = 'left 0.8s ease';
    });
  }, 100);
}

function restart() {
  answers = new Array(23).fill(-1);
  currentQ = 0;
  showPage('introPage');
}
</script>
</body>
</html>
